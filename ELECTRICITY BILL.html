<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill Payment</title>
    <style>
        body {
            background-color: #34495e;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 400px;
            padding: 30px;
            background-color: #ecf0f1;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2980b9;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        button {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input[type="text"],
        input[type="number"] {
            background-color: #fff;
            color: #333;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        .error {
            color: red;
            font-size: 14px;
            display: block;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
    <style>
        .back-arrow {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>


<body>
    <a href="home.html" class="back-arrow">&#8592;</a>
    <div class="container">
        <h1>Electricity Bill Payment</h1>
        <form id="paymentForm">
            <label for="customerID">Customer ID:</label>
            <input type="text" id="customerID" name="customerID">
            <span id="customerError" class="error"></span>

            <!-- Added Amount Field -->
            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" min="1">
            <span id="amountError" class="error"></span>

            <button type="submit">Pay Now</button>
        </form>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            let customerID = document.getElementById('customerID').value.trim();
            let amount = document.getElementById('amount').value.trim();
            let valid = true;

            // Reset previous errors
            document.getElementById('customerError').innerText = "";
            document.getElementById('amountError').innerText = "";

            // Validate Customer ID (must be numeric and at least 5 characters)
            if (!customerID.match(/^\d{5,}$/)) {
                document.getElementById('customerError').innerText = "Customer ID must be at least 5 digits long.";
                valid = false;
            }

            // Validate Amount (must be at least 1)
            if (amount === "" || isNaN(amount) || Number(amount) < 1) {
                document.getElementById('amountError').innerText = "Amount is required.";
                valid = false;
            }

            // If validation passes, redirect to payment.html
            if (valid) {
                window.location.href = 'payment.html';
            }
        });
    </script>
</body>
</html>
