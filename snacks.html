<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Snacks</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        h2 {
            color: #ffcc00;
            margin-bottom: 25px;
        }
        .snack-category {
            margin-bottom: 30px;
        }
        .snack-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .snack-item {
            background: #292929;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .snack-item:hover {
            transform: translateY(-5px);
        }
        .snack-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .snack-name {
            font-weight: bold;
            color: #ffcc00;
            margin: 5px 0;
        }
        .snack-price {
            color: #ddd;
            margin: 5px 0;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            color: #121212;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .quantity-input {
            width: 40px;
            height: 30px;
            text-align: center;
            margin: 0 10px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .details {
            font-size: 18px;
            margin: 30px 0;
            color: #ddd;
        }
        .details span {
            color: #ffcc00;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            background-color: #ffcc00;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #ffd633;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
        }
        .back-button {
            background-color: #333;
            color: white;
        }
        .back-button:hover {
            background-color: #444;
        }
        .skip-button {
            background-color: #2a2a2a;
            color: #ffcc00;
            border: 1px solid #ffcc00;
        }
        .skip-button:hover {
            background-color: #333;
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Select Your Snacks</h2>
        
        <div class="snack-category">
            <h3>Popcorn & Combos</h3>
            <div class="snack-items">
                <div class="snack-item">
                    <img src="popcorn.png" alt="Regular Popcorn" class="snack-img">
                    <div class="snack-name">Regular Popcorn</div>
                    <div class="snack-price">₹120</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="popcorn-regular">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="popcorn-regular" data-price="120">
                        <button class="quantity-btn plus" data-item="popcorn-regular">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="popcorn2.png" alt="Large Popcorn" class="snack-img">
                    <div class="snack-name">Large Popcorn</div>
                    <div class="snack-price">₹180</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="popcorn-large">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="popcorn-large" data-price="180">
                        <button class="quantity-btn plus" data-item="popcorn-large">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="popcorn3.png" alt="Popcorn + Drink Combo" class="snack-img">
                    <div class="snack-name">Popcorn + Drink Combo</div>
                    <div class="snack-price">₹220</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="combo1">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="combo1" data-price="220">
                        <button class="quantity-btn plus" data-item="combo1">+</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="snack-category">
            <h3>Beverages</h3>
            <div class="snack-items">
                <div class="snack-item">
                    <img src="beverage.png" alt="Soft Drink" class="snack-img">
                    <div class="snack-name">Soft Drink</div>
                    <div class="snack-price">₹80</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="soda-regular">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="soda-regular" data-price="80">
                        <button class="quantity-btn plus" data-item="soda-regular">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="fruitjuice.png" alt="Fruit Juice" class="snack-img">
                    <div class="snack-name">Fruit Juice</div>
                    <div class="snack-price">₹100</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="juice">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="juice" data-price="100">
                        <button class="quantity-btn plus" data-item="juice">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="water.png" alt="Mineral Water" class="snack-img">
                    <div class="snack-name">Mineral Water</div>
                    <div class="snack-price">₹60</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="water">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="water" data-price="60">
                        <button class="quantity-btn plus" data-item="water">+</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="snack-category">
            <h3>Snacks</h3>
            <div class="snack-items">
                <div class="snack-item">
                    <img src="nachos.png" alt="Nachos" class="snack-img">
                    <div class="snack-name">Nachos</div>
                    <div class="snack-price">₹150</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="nachos">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="nachos" data-price="150">
                        <button class="quantity-btn plus" data-item="nachos">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="hotdog.png" alt="Hot Dog" class="snack-img">
                    <div class="snack-name">Hot Dog</div>
                    <div class="snack-price">₹160</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="hotdog">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="hotdog" data-price="160">
                        <button class="quantity-btn plus" data-item="hotdog">+</button>
                    </div>
                </div>
                <div class="snack-item">
                    <img src="chocolate.png" alt="Chocolate Bar" class="snack-img">
                    <div class="snack-name">Chocolate Bar</div>
                    <div class="snack-price">₹90</div>
                    <div class="quantity-control">
                        <button class="quantity-btn minus" data-item="chocolate">-</button>
                        <input type="number" class="quantity-input" value="0" min="0" max="10" data-item="chocolate" data-price="90">
                        <button class="quantity-btn plus" data-item="chocolate">+</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="details">
            <p>Snacks Total: ₹<span id="snacks-total">0</span></p>
            <p>Seats Total: ₹<span id="seats-total">0</span></p>
            <p>Grand Total: ₹<span id="grand-total">0</span></p>
        </div>
        
        <div class="action-buttons">
            <button class="back-button" id="back-to-seats">Back to Seats</button>
            <button class="skip-button" id="skip-snacks">Skip Snacks</button>
            <button id="proceed-to-payment">Proceed to Payment</button>
        </div>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const seatsCount = urlParams.get('count') || 0;
        const seatsAmount = urlParams.get('amount') || 0;
        const selectedDate = urlParams.get('date') || '';
        const selectedTime = urlParams.get('time') || '';
        const selectedSeats = urlParams.get('seats') || '';
        const movieName = urlParams.get('movie') || '';
        
        // Display seats total
        document.getElementById('seats-total').textContent = seatsAmount;
        document.getElementById('grand-total').textContent = seatsAmount;
        
        // Quantity controls
        document.querySelectorAll('.quantity-btn').forEach(button => {
            button.addEventListener('click', function() {
                const item = this.dataset.item;
                const input = document.querySelector(`.quantity-input[data-item="${item}"]`);
                let value = parseInt(input.value);
                
                if (this.classList.contains('minus') && value > 0) {
                    value--;
                } else if (this.classList.contains('plus') && value < 10) {
                    value++;
                }
                
                input.value = value;
                calculateTotal();
            });
        });
        
        // Input change handler
        document.querySelectorAll('.quantity-input').forEach(input => {
            input.addEventListener('change', function() {
                if (this.value < 0) this.value = 0;
                if (this.value > 10) this.value = 10;
                calculateTotal();
            });
        });
        
        // Calculate totals
        function calculateTotal() {
            let snacksTotal = 0;
            
            document.querySelectorAll('.quantity-input').forEach(input => {
                const quantity = parseInt(input.value);
                const price = parseInt(input.dataset.price);
                snacksTotal += quantity * price;
            });
            
            const grandTotal = snacksTotal + parseInt(seatsAmount);
            
            document.getElementById('snacks-total').textContent = snacksTotal;
            document.getElementById('grand-total').textContent = grandTotal;
        }
        
        // Back button
        document.getElementById('back-to-seats').addEventListener('click', function() {
            window.location.href = `Seats booking.html?movie=${encodeURIComponent(movieName)}`;
        });
        
        // Skip snacks button
        document.getElementById('skip-snacks').addEventListener('click', function() {
            proceedToPayment([]);
        });
        
        // Proceed to payment
        document.getElementById('proceed-to-payment').addEventListener('click', function() {
            // Collect selected snacks
            const snacks = [];
            document.querySelectorAll('.quantity-input').forEach(input => {
                if (input.value > 0) {
                    snacks.push({
                        item: input.dataset.item,
                        quantity: input.value,
                        price: input.dataset.price
                    });
                }
            });
            
            proceedToPayment(snacks);
        });
        
        function proceedToPayment(snacks) {
            // Convert to URL parameters
            const snacksParam = encodeURIComponent(JSON.stringify(snacks));
            const snacksTotal = snacks.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            
            window.location.href = `payment.html?movie=${encodeURIComponent(movieName)}&count=${seatsCount}&seatsAmount=${seatsAmount}&date=${selectedDate}&time=${selectedTime}&seats=${selectedSeats}&snacks=${snacksParam}&snacksTotal=${snacksTotal}`;
        }
        
        // Initialize totals
        calculateTotal();
    </script>

</body>
</html>
