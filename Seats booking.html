<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Booking</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        h2 {
            color: #ffcc00;
            margin-bottom: 25px;
        }
        h3 {
            color: #ffcc00;
            margin-bottom: 15px;
        }
        .selection-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin: 25px 0;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .option-button {
            padding: 12px 20px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .option-button:hover {
            background-color: #333;
            transform: translateY(-2px);
        }
        .option-button.selected {
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            border-color: #ffcc00;
        }
        .seat-layout {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
            justify-content: center;
            margin: 30px auto;
            max-width: 700px;
        }
        .seat {
            width: 30px;
            height: 30px;
            background-color: #292929;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 9px;
            border: 1px solid #444;
        }
        .seat:hover {
            transform: scale(1.1);
        }
        .seat.booked {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            border-color: #555;
        }
        .seat.selected {
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            border-color: #ffcc00;
        }
        .screen {
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, #ffcc00, #121212);
            margin: 20px 0;
            border-radius: 5px;
            color: #121212;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .details {
            font-size: 18px;
            margin: 20px 0;
            color: #ddd;
        }
        .details span {
            color: #ffcc00;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            background-color: #ffcc00;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #ffd633;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .back-button {
            background-color: #333;
            color: white;
        }
        .back-button:hover {
            background-color: #444;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .movie-info {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Select Your Seats</h2>
        
        <div class="movie-info" id="movie-title">Movie: <span id="movie-name">Loading...</span></div>
        
        <div class="screen">Screen This Way</div>
        
        <div class="selection-container">
            <div>
                <h3>Select Date:</h3>
                <div class="options" id="date-options">
                    <button class="option-button" data-value="2024-04-05">April 5</button>
                    <button class="option-button" data-value="2024-04-06">April 6</button>
                    <button class="option-button" data-value="2024-04-07">April 7</button>
                    <button class="option-button" data-value="2024-04-08">April 8</button>
                    <button class="option-button" data-value="2024-04-09">April 9</button>
                    <button class="option-button" data-value="2024-04-10">April 10</button>
                </div>
            </div>
            <div>
                <h3>Select Time:</h3>
                <div class="options" id="time-options">
                    <button class="option-button" data-value="10:00">10:00 AM</button>
                    <button class="option-button" data-value="13:00">1:00 PM</button>
                    <button class="option-button" data-value="16:00">4:00 PM</button>
                    <button class="option-button" data-value="19:00">7:00 PM</button>
                    <button class="option-button" data-value="22:00">10:00 PM</button>
                </div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #292929;"></div>
                <span>Available</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #555;"></div>
                <span>Booked</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ffcc00;"></div>
                <span>Selected</span>
            </div>
        </div>
        
        <div class="seat-layout"></div>
        
        <p class="details">Tickets Selected: <span class="count">0</span></p>
        <p class="details">Total Amount: ₹<span class="amount">0</span></p>
        
        <div class="action-buttons">
            <button class="back-button" onclick="window.history.back()">Back to Movies</button>
            <button id="proceed" disabled>Proceed to Payment</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const seatsContainer = document.querySelector(".seat-layout");
        const proceedBtn = document.getElementById("proceed");
        const countEl = document.querySelector(".count");
        const amountEl = document.querySelector(".amount");
        const movieNameEl = document.getElementById("movie-name");
        
        // Get movie name from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const movieName = urlParams.get('movie') || "Selected Movie";
        movieNameEl.textContent = movieName;
        
        // State variables
        let selectedDate = "";
        let selectedTime = "";
        let selectedSeats = 0;
        let totalAmount = 0;
        const seatPrice = 250;
        
        // Initialize date and time selection
        document.querySelectorAll("#date-options .option-button").forEach(button => {
            button.addEventListener("click", () => {
                document.querySelectorAll("#date-options .option-button").forEach(btn => {
                    btn.classList.remove("selected");
                });
                button.classList.add("selected");
                selectedDate = button.dataset.value;
                generateSeats();
                updateProceedButton();
            });
        });
        
        document.querySelectorAll("#time-options .option-button").forEach(button => {
            button.addEventListener("click", () => {
                document.querySelectorAll("#time-options .option-button").forEach(btn => {
                    btn.classList.remove("selected");
                });
                button.classList.add("selected");
                selectedTime = button.dataset.value;
                generateSeats();
                updateProceedButton();
            });
        });
        
        // Generate seats based on current selection
        function generateSeats() {
            if (!selectedDate || !selectedTime) return;
            
            seatsContainer.innerHTML = "";
            selectedSeats = 0;
            totalAmount = 0;
            updateDisplay();
            
            const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
            
            rows.forEach(row => {
                for (let i = 1; i <= 12; i++) {
                    const seatId = `${row}${i}`;
                    // Generate booking pattern based on movie+date+time combination
                    const uniqueKey = `${movieName}-${selectedDate}-${selectedTime}-${seatId}`;
                    const hash = hashCode(uniqueKey);
                    const isBooked = (hash % 100) < 30; // ~30% booked
                    
                    const seat = document.createElement("div");
                    seat.classList.add("seat");
                    if (isBooked) seat.classList.add("booked");
                    seat.dataset.price = seatPrice;
                    seat.dataset.id = seatId;
                    seat.textContent = seatId;
                    
                    seatsContainer.appendChild(seat);
                }
            });
        }
        
        // Simple hash function for consistent seat booking patterns
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0; // Convert to 32bit integer
            }
            return Math.abs(hash);
        }
        
        // Seat selection handler
        seatsContainer.addEventListener("click", (e) => {
            if (e.target.classList.contains("seat") && !e.target.classList.contains("booked")) {
                e.target.classList.toggle("selected");
                
                const price = parseInt(e.target.dataset.price);
                if (e.target.classList.contains("selected")) {
                    selectedSeats++;
                    totalAmount += price;
                } else {
                    selectedSeats--;
                    totalAmount -= price;
                }
                
                updateDisplay();
                updateProceedButton();
            }
        });
        
        // Update display
        function updateDisplay() {
            countEl.textContent = selectedSeats;
            amountEl.textContent = totalAmount;
        }
        
        // Update proceed button state
        function updateProceedButton() {
            proceedBtn.disabled = selectedSeats === 0 || !selectedDate || !selectedTime;
        }
        
        // Proceed to payment
        proceedBtn.addEventListener("click", () => {
            const selectedSeatIds = Array.from(document.querySelectorAll(".seat.selected"))
                .map(seat => seat.dataset.id)
                .join(",");
                
            window.location.href = `snacks.html?movie=${encodeURIComponent(movieName)}&count=${selectedSeats}&amount=${totalAmount}&date=${selectedDate}&time=${selectedTime}&seats=${selectedSeatIds}`;
        });
        
        // Auto-select first date and time option if none selected
        window.addEventListener('load', () => {
            const firstDateBtn = document.querySelector("#date-options .option-button");
            const firstTimeBtn = document.querySelector("#time-options .option-button");
            
            if (firstDateBtn && !selectedDate) {
                firstDateBtn.click();
            }
            if (firstTimeBtn && !selectedTime) {
                firstTimeBtn.click();
            }
        });
    </script>
</body>
</html>
